<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Vouchers</title>
    <style>
        /* Define page margins */
        @page {
            size: A4;
            margin: 2mm;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .voucher-box {
            display: inline-block;
            height: 150px;
            width: 250px;
            position: relative;
            border: 1px dashed #999;
            margin: 2px;
            overflow: hidden;
        }

        .voucher-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.9;
        }

        .voucher-price {
            position: absolute;
            font-size: 26px;
            transform: rotate(-90deg);
            color: white;
            z-index: 1;
        }

        .voucher-code {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            z-index: 2;
        }

        .voucher-name {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            z-index: 3;
        }

        .voucher-uptime,
        .voucher-validity,
        .voucher-speed {
            position: absolute;
            font-size: 10px;
            z-index: 4;
        }
    </style>
</head>
<body>
${VOUCHERS}
</body>
</html>
