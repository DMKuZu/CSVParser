<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vouchers</title>
    <style>
        .box {
            display: inline-block;
            height: 190px;
            width: 299px;
            position: relative;
            border: 1px dashed #999;
            margin-top: 3px;
            overflow: hidden;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .kiri {
            float: left;
            margin: 51px 0 0 35px;
            font-family: "Courier New", monospace;
            font-weight: bold;
        }

        .kanan {
            float: right;
            width: 103px;
            margin: 20px 40px 0 0;
        }

        .form1 { font-size: 30px; margin: 75px 0 0 35px; }
        .form2 { font-size: 28px; margin: 25px 0 0 35px; }
        .form3 {
            transform: rotate(-90deg);
            font-size: 30px;
            margin: -105px 0 0 -268px;
            text-align: center;
            font-family: "Century Gothic", sans-serif;
            color: white;
        }
        .form4 {
            font-size: 21px;
            margin: -102px 0 0 -7px;
            text-align: center;
            font-family: "Century Gothic", sans-serif;
            font-weight: bold;
        }
        .form5, .form6, .form7 {
            font-size: 12px;
            text-align: center;
            font-family: "Century Gothic", sans-serif;
        }
        .form5 { margin: -1px 0 0 -136px; }
        .form6 { margin: 1px 0 0 -129px; }
        .form7 { margin: -31px 0 0 95px; }
    </style>
</head>

<body>
${VOUCHERS}
</body>
</html>
